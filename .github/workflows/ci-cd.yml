name: Deploy

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy artifacts
        run: |
          mkdir deploy
          cp -r dist public node_modules package.json package-lock.json next.config.ts deploy/

      - name: Deploy
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: deploy/
          remote_path: /home/ubuntu/var/www/codefjell/
          remote_host: ${{ secrets.EC2_HOST }}
          remote_user: ${{ secrets.EC2_USER }}
          remote_key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 400 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$HOST "
            source ~/.nvm/nvm.sh &&
            cd /home/ubuntu/var/www/codefjell &&
            pm2 restart codefjell || pm2 start npm --name codefjell -- start
          "

          rm key.pem
